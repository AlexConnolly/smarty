# Local Elasticsearch + Kibana for developing/testing the Smarty `kibana` capability.
# Security is disabled (dev only) so the capability can hit http://localhost:9200 with no API key.
# The capability talks to Elasticsearch's _search API directly; Kibana is here for the UI (http://localhost:5601).
#
#   docker compose -p smarty-logs up -d
#   docker compose -p smarty-logs down -v   # tear down + wipe data

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: smarty-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 5s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: smarty-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
